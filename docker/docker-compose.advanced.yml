# Lab 03 — Advanced Features: suitecrm with TLS, resource limits, logging
---
services:
  suitecrm:
    image: bitnami/suitecrm:latest
    container_name: it-stack-suitecrm
    restart: unless-stopped
    ports:
      - "80:$firstPort"
    environment:
      - IT_STACK_ENV=lab-03-advanced
      - TLS_ENABLED=true
    volumes:
      - suitecrm_data:/var/lib/suitecrm
      - ./certs:/etc/ssl/certs:ro
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: G
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - it-stack-net

networks:
  it-stack-net:
    driver: bridge

volumes:
  suitecrm_data:
